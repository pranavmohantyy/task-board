<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Board</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <input type="text" id="filter" placeholder="Filter tasks..." />
    <button id="export-btn">Export to CSV</button>
    <div class="board">
        <div class="column">
            <div class="header">To Do <span class="badge" id="todo-count">0</span></div>
            <div class="task-list">
                <div class="task" draggable="true">Sample Task 1 <span class="priority" data-priority="low"><span class="dot low"></span></span> <span class="due-date" contenteditable='true'>Due: N/A</span> <button class="delete-btn">X</button></div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
