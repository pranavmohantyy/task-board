<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>Task Board</title>\n    <link rel=\"stylesheet\" href=\"style.css\">\n</head>\n<body>\n    <div class=\"board\">\n        <div class=\"column\">\n            <div class=\"header\">To Do <span class=\"badge\" id=\"todo-count\">0</span></div>\n            <div class=\"task-list\">\n                <div class=\"task\" draggable=\"true\">Sample Task 1 <span class=\"priority\" data-priority=\"low\"><span class=\"dot low\"></span></span> <span class=\"due-date\" contenteditable='true'>Due: N/A</span> <button class=\"delete-btn\">X</button></div>\n            </div>\n        </div>\n        <div class=\"column\">\n            <div class=\"header\">In Progress <span class=\"badge\" id=\"in-progress-count\">0</span></div>\n            <div class=\"task-list\">\n            </div>\n        </div>\n        <div class=\"column\">\n            <div class=\"header\">Done <span class=\"badge\" id=\"done-count\">0</span></div>\n            <div class=\"task-list\">\n            </div>\n        </div>\n    </div>\n    <script src=\"app.js\"></script>\n</body>\n</html>
