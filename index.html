<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>Task Board</title>\n    <style>\n        body { font-family: Arial, sans-serif; }\n        .column { width: 30%; display: inline-block; vertical-align: top; margin: 10px; }\n        .header { font-size: 24px; font-weight: bold; }\n        .task-list { border: 1px solid #ccc; min-height: 200px; padding: 10px; }\n    </style>\n</head>\n<body>\n    <div class=\"column\">\n        <div class=\"header\">To Do</div>\n        <button onclick=\"addTask('todo')\">Add Task</button>\n        <div class=\"task-list\" id=\"todo-list\"></div>\n    </div>\n    <div class=\"column\">\n        <div class=\"header\">In Progress</div>\n        <button onclick=\"addTask('inProgress')\">Add Task</button>\n        <div class=\"task-list\" id=\"in-progress-list\"></div>\n    </div>\n    <div class=\"column\">\n        <div class=\"header\">Done</div>\n        <button onclick=\"addTask('done')\">Add Task</button>\n        <div class=\"task-list\" id=\"done-list\"></div>\n    </div>\n    <script>\n        function addTask(column) {\n            const task = prompt(\"Enter task name:\");\n            if (task) {\n                const list = document.getElementById(column === 'todo' ? 'todo-list' : column === 'inProgress' ? 'in-progress-list' : 'done-list');\n                const taskItem = document.createElement(\"div\");\n                taskItem.textContent = task;\n                list.appendChild(taskItem);\n            }\n        }\n    <\/script>\n</body>\n</html>
